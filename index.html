<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Conversor de moedas em tempo real — converta Real (BRL) para Dólar (USD) e Euro (EUR) com cotações atualizadas.">
    <link rel="shortcut icon" href="imagem/moeda.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
    <title>Conversor de Moedas — BRL para USD e EUR</title>
</head>

<body>
    <div class="app">
        <div class="particles" aria-hidden="true">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

        <main class="container" id="main-container">
            <header class="header">
                <div class="logo">
                    <span class="logo-icon">💱</span>
                    <h1>Conversor de Moedas</h1>
                </div>
                <p class="subtitle">Cotações em tempo real</p>
            </header>

            <section class="input-section">
                <label for="real" class="input-label">
                    <span class="flag">🇧🇷</span>
                    Valor em Reais (BRL)
                </label>
                <div class="input-wrapper">
                    <span class="currency-prefix">R$</span>
                    <input type="text" id="real" class="converter-input" placeholder="0,00" inputmode="decimal"
                        autocomplete="off">
                </div>
            </section>

            <div class="divider">
                <span class="divider-icon">⇅</span>
            </div>

            <section class="results" id="results">
                <div class="card card-usd" id="card-usd">
                    <div class="card-header">
                        <span class="card-flag">🇺🇸</span>
                        <div class="card-info">
                            <span class="card-currency">Dólar Americano</span>
                            <span class="card-code">USD</span>
                        </div>
                    </div>
                    <div class="card-value" id="valor-usd">
                        <span class="card-symbol">US$</span>
                        <input type="text" class="card-amount" id="input-usd" placeholder="0,00" inputmode="decimal"
                            autocomplete="off">
                    </div>
                    <div class="card-rate">
                        <span class="rate-label">Cotação:</span>
                        <span class="rate-value" id="taxa-usd">carregando...</span>
                    </div>
                </div>

                <div class="card card-eur" id="card-eur">
                    <div class="card-header">
                        <span class="card-flag">🇪🇺</span>
                        <div class="card-info">
                            <span class="card-currency">Euro</span>
                            <span class="card-code">EUR</span>
                        </div>
                    </div>
                    <div class="card-value" id="valor-eur">
                        <span class="card-symbol">€</span>
                        <input type="text" class="card-amount" id="input-eur" placeholder="0,00" inputmode="decimal"
                            autocomplete="off">
                    </div>
                    <div class="card-rate">
                        <span class="rate-label">Cotação:</span>
                        <span class="rate-value" id="taxa-eur">carregando...</span>
                    </div>
                </div>
            </section>

            <footer class="status-bar">
                <div class="status-indicator" id="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text" id="status-text">Conectando...</span>
                </div>
                <span class="last-update" id="last-update"></span>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
